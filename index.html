<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codelo VN - Enterprise Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --primary-blue: #2563eb;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .checkout-container {
            width: 100%;
            max-width: 480px;
        }

        /* Header Style */
        .brand-header {
            margin-bottom: 32px;
            padding-left: 8px;
        }
        .brand-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
            margin: 0;
        }
        .brand-header p {
            color: var(--text-muted);
            margin: 4px 0 0;
            font-size: 14px;
        }

        /* Card Section Style */
        .section-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-color);
        }

        .label-text {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
            display: block;
        }

        /* Product Option */
        .product-option {
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .product-option.selected {
            border-color: var(--primary-blue);
            background-color: #eff6ff;
        }
        .dot {
            width: 18px; height: 18px;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            margin-right: 16px;
        }
        .selected .dot {
            border: 5px solid var(--primary-blue);
        }

        /* Form Input */
        .input-box {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .input-box:focus {
            outline: none;
            border-color: var(--primary-blue);
        }

        /* Button */
        .btn-pay {
            width: 100%;
            padding: 16px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-pay:hover { background: #1d4ed8; }

        /* QR Style */
        #qrScreen { display: none; text-align: center; }
        .qr-img { width: 200px; height: 200px; margin: 20px 0; }
        .code-display {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-blue);
        }
    </style>
</head>
<body>

<div class="checkout-container">
    <div class="brand-header">
        <h1>Codelo VN</h1>
        <p>Cổng thanh toán trực tuyến - nhận tài liệu qua gmail trong 2 phút</p>
<p>Liên hệ Codelo tại: 0376-138-554</p>
    </div>

    <div id="mainForm">
        <div class="section-card">
            <span class="label-text">Dịch vụ cung cấp</span>
            <div class="product-option selected" id="prod1">
                <div class="dot"></div>
                <div>
                    <div style="font-weight:600">Bản mẫu vật lý Codelo</div>
                    <div style="color:var(--text-muted); font-size: 13px;">2.000 ₫</div>
                </div>
            </div>
        </div>

        <div class="section-card">
            <span class="label-text">Thông tin liên hệ</span>
            <input type="text" class="input-box" id="cName" placeholder="Họ và tên (Ví dụ: Nguyễn Văn A)">
            <input type="tel" class="input-box" id="cPhone" placeholder="Số điện thoại (Ví dụ: 0912 345 678)">
            <input type="email" class="input-box" id="cEmail" placeholder="Email nhận file (Ví dụ: nguyenvan@gmail.com)">
        </div>

        <button class="btn-pay" onclick="processPayment()">Xác nhận thanh toán</button>
    </div>

    <div id="qrScreen" class="section-card">
        <h3 style="margin-top:0">Quét mã QR để thanh toán</h3>
        <img id="qrImg" class="qr-img" src="" alt="QR">
        <div class="code-display" id="transferCode"></div>
        <p style="font-size: 13px; color: var(--text-muted)">Hệ thống sẽ gửi file qua Email sau khi nhận tiền.</p>
    </div>
</div>

<script>
    function processPayment() {
        const email = document.getElementById('cEmail').value;
        if(!email.includes('@')) { alert("Vui lòng nhập Email hợp lệ"); return; }
        
        const code = "CODELO" + Math.floor(1000 + Math.random() * 9000);
        const qr = `https://img.vietqr.io/image/TPBank-00005508312-compact2.png?amount=2000&addInfo=${code}&accountName=TRAN BUI NHUT HY`;
        
        document.getElementById('mainForm').style.display = 'none';
        document.getElementById('qrImg').src = qr;
        document.getElementById('transferCode').innerText = code;
        document.getElementById('qrScreen').style.display = 'block';
    }
</script>

</body>
</html>
