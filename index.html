<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codelo VN - Enterprise Multi-Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --primary-blue: #2563eb;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .checkout-container {
            width: 100%;
            max-width: 480px;
        }

        .brand-header {
            margin-bottom: 32px;
            padding-left: 8px;
        }
        .brand-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
            margin: 0;
        }
        .brand-header p {
            color: var(--text-muted);
            margin: 4px 0 0;
            font-size: 14px;
        }

        .section-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-color);
        }

        .label-text {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
            display: block;
        }

        /* Danh sách sản phẩm động */
        .product-list {
            display: grid;
            gap: 12px;
        }
        .product-option {
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .product-option:hover {
            border-color: #cbd5e1;
        }
        .product-option.selected {
            border-color: var(--primary-blue);
            background-color: #eff6ff;
        }
        .dot {
            width: 18px; height: 18px;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            margin-right: 16px;
            transition: all 0.2s;
        }
        .product-option.selected .dot {
            border: 5px solid var(--primary-blue);
        }

        .input-box {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .input-box:focus {
            outline: none;
            border-color: var(--primary-blue);
        }

        .btn-pay {
            width: 100%;
            padding: 16px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-pay:hover { background: #1d4ed8; }
        .btn-pay:disabled { background: #94a3b8; cursor: not-allowed; }

        #qrScreen { display: none; text-align: center; }
        .qr-img { width: 200px; height: 200px; margin: 20px 0; border-radius: 12px; border: 1px solid var(--border-color); }
        .code-display {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-blue);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="checkout-container">
    <div class="brand-header">
        <h1>Codelo VN</h1>
        <p>Cổng thanh toán trực tuyến - nhận tài liệu qua gmail trong 2 phút</p>
        <p>Liên hệ Codelo tại: 0376-138-554</p>
    </div>

    <div id="mainForm">
        <div class="section-card">
            <span class="label-text">Dịch vụ cung cấp</span>
            <div class="product-list" id="productGrid">
                </div>
        </div>

        <div class="section-card">
            <span class="label-text">Thông tin liên hệ</span>
            <input type="text" class="input-box" id="cName" placeholder="Họ và tên (Ví dụ: Nguyễn Văn A)">
            <input type="tel" class="input-box" id="cPhone" placeholder="Số điện thoại (Ví dụ: 0912 345 678)">
            <input type="email" class="input-box" id="cEmail" placeholder="Email nhận file (Ví dụ: nguyenvan@gmail.com)">
        </div>

        <button class="btn-pay" id="btnSubmit" onclick="processPayment()">Xác nhận thanh toán</button>
    </div>

    <div id="qrScreen" class="section-card">
        <h3 style="margin-top:0">Quét mã QR để thanh toán</h3>
        <img id="qrImg" class="qr-img" src="" alt="QR">
        <div class="code-display" id="transferCode"></div>
        <p style="font-size: 14px; font-weight: 600; margin-top: 15px; color: #1e293b;" id="qrPriceDisplay"></p>
        <p style="font-size: 13px; color: var(--text-muted)">Hệ thống sẽ tự động gửi file qua Email của bạn, vui lòng kiểm tra mục Spam nếu không tìm thấy.</p>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbypLx5IWG_RGbc31bMoXlqSnUnojtrRPbs_qo6s2XQyJYyjrS-dr7l0Iv0lYmOoNqB0dA/exec";

    // 🌟 KHO SẢN PHẨM: CẬU CHỦ MUỐN THÊM GÓI MỚI THÌ THÊM VÀO ĐÂY NHA 🎉
    const dataProducts = [
        { id: "g1", name: "Tài liệu Excel cơ bản", price: 9700 },
        { id: "g2", name: "Tài liệu nâng cao Codelo ( Chưa triển khai)", price: 20000 },
        { id: "g3", name: "Combo Full Tính Năng Codelo (Chưa triển khai)", price: 100000 }
    ];

    let currentSelectedProduct = dataProducts[0]; // Mặc định chọn gói đầu tiên

    // Hàm tự động vẽ các gói lên màn hình
    function initProducts() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';
        dataProducts.forEach((prod, index) => {
            const isSelected = index === 0 ? 'selected' : '';
            const html = `
                <div class="product-option ${isSelected}" id="item-${prod.id}" onclick="changeProduct('${prod.id}')">
                    <div class="dot"></div>
                    <div>
                        <div style="font-weight:600">${prod.name}</div>
                        <div style="color:var(--text-muted); font-size: 13px;">${prod.price.toLocaleString('vi-VN')} ₫</div>
                    </div>
                </div>
            `;
            grid.insertAdjacentHTML('beforeend', html);
        });
    }

    // Hàm xử lý khi khách click chọn gói khác
    function changeProduct(id) {
        document.querySelectorAll('.product-option').forEach(el => el.classList.remove('selected'));
        document.getElementById(`item-${id}`).classList.add('selected');
        currentSelectedProduct = dataProducts.find(p => p.id === id);
    }

    function processPayment() {
        const name = document.getElementById('cName').value.trim();
        const phone = document.getElementById('cPhone').value.trim();
        const email = document.getElementById('cEmail').value.trim();
        
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if(!emailRegex.test(email)) { 
            alert("Vui lòng nhập Email hợp lệ để nhận file"); 
            return; 
        }
        
        const btn = document.getElementById('btnSubmit');
        btn.innerText = "Đang khởi tạo đơn hàng...";
        btn.disabled = true;

        const code = "CODELO" + Math.floor(1000 + Math.random() * 9000);
        // Tạo mã QR lấy đúng giá tiền của gói đang chọn mua động
        const qr = `https://img.vietqr.io/image/TPBank-00005508312-compact2.png?amount=${currentSelectedProduct.price}&addInfo=${code}&accountName=TRAN BUI NHUT HY`;
        
        // Gửi toàn bộ thông tin kèm Tên sản phẩm và Giá sản phẩm lên Sheets
        fetch(SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ 
                action: "createOrder", 
                email: email, 
                orderCode: code,
                customerName: name || "bạn", 
                customerPhone: phone || "Không cung cấp",
                productName: currentSelectedProduct.name,
                productPrice: currentSelectedProduct.price // Bắn giá gói lên Sheets
            })
        }).then(() => {
            document.getElementById('mainForm').style.display = 'none';
            document.getElementById('qrImg').src = qr;
            document.getElementById('transferCode').innerText = code;
            document.getElementById('qrPriceDisplay').innerText = `Số tiền cần chuyển: ${currentSelectedProduct.price.toLocaleString('vi-VN')} ₫`;
            document.getElementById('qrScreen').style.display = 'block';
        }).catch(() => {
            alert("Lỗi kết nối mạng. Vui lòng thử lại!");
            btn.innerText = "Xác nhận thanh toán";
            btn.disabled = false;
        });
    }

    // Chạy vẽ danh sách sản phẩm khi web tải xong
    window.onload = initProducts;
</script>

</body>
</html>
